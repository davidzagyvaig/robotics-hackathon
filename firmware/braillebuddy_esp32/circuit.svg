<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" font-family="Segoe UI, Arial, sans-serif">
  <!-- ============================================================= -->
  <!-- BrailleBuddy ESP32-S3 wiring diagram                          -->
  <!-- Pins match firmware/braillebuddy_esp32/src/main.cpp           -->
  <!-- Components: ESP32-S3, 6x MG90S servos, one push button        -->
  <!-- (to 3V3, active-high), 5V supply + bus.                       -->
  <!-- No pot, no haptic, no switch.                                 -->
  <!-- ============================================================= -->
  <rect x="0" y="0" width="1280" height="960" fill="#f6f5f1"/>

  <!-- title -->
  <text x="640" y="34" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">BrailleBuddy — ESP32-S3 wiring</text>
  <text x="640" y="56" text-anchor="middle" font-size="13" fill="#666">6× MG90S servos on the shared 5 V bus · push button on GPIO18 + 3V3 (active-high) · matches src/main.cpp</text>

  <!-- ===================== POWER BUS ===================== -->
  <!-- 5V supply -->
  <rect x="14" y="100" width="82" height="70" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="55" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">5 V</text>
  <text x="55" y="148" text-anchor="middle" font-size="11" fill="#b45309">SUPPLY</text>
  <text x="88" y="116" text-anchor="end" font-size="13" font-weight="700" fill="#e23b3b">+</text>
  <text x="88" y="166" text-anchor="end" font-size="14" font-weight="700" fill="#2b2b2b">−</text>

  <!-- rails -->
  <line x1="96" y1="110" x2="1210" y2="110" stroke="#e23b3b" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="160" x2="1210" y2="160" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round"/>
  <text x="120" y="100" font-size="13" font-weight="700" fill="#e23b3b">V+ BUS  (+5 V)</text>
  <text x="120" y="180" font-size="13" font-weight="700" fill="#2b2b2b">GND BUS  (common ground)</text>

  <!-- 1000uF cap across the rails, near the servos (recommended) -->
  <line x1="300" y1="110" x2="300" y2="126" stroke="#e23b3b" stroke-width="2.5"/>
  <line x1="288" y1="126" x2="312" y2="126" stroke="#444" stroke-width="3"/>
  <path d="M291 140 Q300 147 309 140" fill="none" stroke="#444" stroke-width="3"/>
  <line x1="300" y1="143" x2="300" y2="160" stroke="#2b2b2b" stroke-width="2.5"/>
  <text x="282" y="122" font-size="12" font-weight="700" fill="#e23b3b">+</text>
  <text x="318" y="136" font-size="12" fill="#333">1000 µF</text>
  <text x="318" y="151" font-size="10" fill="#888">(recommended)</text>
  <circle cx="300" cy="110" r="4.5" fill="#e23b3b"/>
  <circle cx="300" cy="160" r="4.5" fill="#2b2b2b"/>

  <!-- vertical feeders that tap the rails and run down past the servos -->
  <line x1="510" y1="110" x2="510" y2="700" stroke="#e23b3b" stroke-width="3"/>
  <line x1="480" y1="160" x2="480" y2="700" stroke="#2b2b2b" stroke-width="3"/>
  <circle cx="510" cy="110" r="4.5" fill="#e23b3b"/>
  <circle cx="480" cy="160" r="4.5" fill="#2b2b2b"/>
  <text x="516" y="690" font-size="10" fill="#e23b3b">V+ feeder</text>
  <text x="474" y="690" text-anchor="end" font-size="10" fill="#2b2b2b">GND feeder</text>

  <!-- ===================== ESP32-S3 BOARD ===================== -->
  <rect x="110" y="230" width="220" height="530" rx="12" fill="#27344e" stroke="#16202f" stroke-width="2"/>
  <rect x="198" y="222" width="44" height="10" rx="2" fill="#3a4a66"/>
  <text x="220" y="216" text-anchor="middle" font-size="9" fill="#888">USB-C</text>
  <text x="220" y="262" text-anchor="middle" font-size="16" font-weight="700" fill="#eaeef5">ESP32-S3</text>
  <text x="220" y="280" text-anchor="middle" font-size="11" fill="#9fb0c8">DevKitC-1</text>

  <!-- top power pads -->
  <rect x="173" y="223" width="14" height="14" rx="2" fill="#d4af37"/>
  <text x="180" y="250" text-anchor="middle" font-size="11" fill="#fff">5V</text>
  <rect x="253" y="223" width="14" height="14" rx="2" fill="#d4af37"/>
  <text x="260" y="250" text-anchor="middle" font-size="11" fill="#fff">GND</text>
  <line x1="180" y1="223" x2="180" y2="110" stroke="#e23b3b" stroke-width="3"/>
  <line x1="260" y1="223" x2="260" y2="160" stroke="#2b2b2b" stroke-width="3"/>
  <circle cx="180" cy="110" r="4.5" fill="#e23b3b"/>
  <circle cx="260" cy="160" r="4.5" fill="#2b2b2b"/>

  <!-- right edge GPIO pads (servo signals) -->
  <g font-size="12" fill="#fff" text-anchor="end">
    <rect x="323" y="293" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="304">GPIO4</text>
    <rect x="323" y="363" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="374">GPIO5</text>
    <rect x="323" y="433" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="444">GPIO6</text>
    <rect x="323" y="503" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="514">GPIO7</text>
    <rect x="323" y="573" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="584">GPIO15</text>
    <rect x="323" y="643" width="14" height="14" rx="2" fill="#d4af37"/><text x="319" y="654">GPIO16</text>
  </g>

  <!-- bottom edge pads (button: signal + 3V3) -->
  <g font-size="11" fill="#fff" text-anchor="middle">
    <rect x="223" y="753" width="14" height="14" rx="2" fill="#d4af37"/><text x="230" y="748">GPIO18</text>
    <rect x="293" y="753" width="14" height="14" rx="2" fill="#d4af37"/><text x="300" y="748">3V3</text>
  </g>

  <!-- ===================== SERVOS ===================== -->
  <!-- body 560..700, pins on left at 545; SIG to ESP, V+/GND to bus feeders -->
  <g>
    <!-- S1 dot1 SIG_y=300 -->
    <line x1="545" y1="300" x2="330" y2="300" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="316" x2="510" y2="316" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="332" x2="480" y2="332" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="300" r="4" fill="#f59e0b"/><circle cx="510" cy="316" r="4" fill="#e23b3b"/><circle cx="480" cy="332" r="4" fill="#2b2b2b"/>
    <rect x="560" y="286" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="316" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="316" x2="712" y2="307" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="312" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S1</text>
    <text x="628" y="330" text-anchor="middle" font-size="11" fill="#555">dot 1</text>
    <text x="566" y="303" font-size="9" fill="#777">SIG</text><text x="566" y="319" font-size="9" fill="#777">V+</text><text x="566" y="335" font-size="9" fill="#777">GND</text>

    <!-- S2 dot2 SIG_y=370 -->
    <line x1="545" y1="370" x2="330" y2="370" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="386" x2="510" y2="386" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="402" x2="480" y2="402" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="370" r="4" fill="#f59e0b"/><circle cx="510" cy="386" r="4" fill="#e23b3b"/><circle cx="480" cy="402" r="4" fill="#2b2b2b"/>
    <rect x="560" y="356" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="386" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="386" x2="712" y2="377" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="382" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S2</text>
    <text x="628" y="400" text-anchor="middle" font-size="11" fill="#555">dot 2</text>
    <text x="566" y="373" font-size="9" fill="#777">SIG</text><text x="566" y="389" font-size="9" fill="#777">V+</text><text x="566" y="405" font-size="9" fill="#777">GND</text>

    <!-- S3 dot3 SIG_y=440 -->
    <line x1="545" y1="440" x2="330" y2="440" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="456" x2="510" y2="456" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="472" x2="480" y2="472" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="440" r="4" fill="#f59e0b"/><circle cx="510" cy="456" r="4" fill="#e23b3b"/><circle cx="480" cy="472" r="4" fill="#2b2b2b"/>
    <rect x="560" y="426" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="456" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="456" x2="712" y2="447" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="452" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S3</text>
    <text x="628" y="470" text-anchor="middle" font-size="11" fill="#555">dot 3</text>
    <text x="566" y="443" font-size="9" fill="#777">SIG</text><text x="566" y="459" font-size="9" fill="#777">V+</text><text x="566" y="475" font-size="9" fill="#777">GND</text>

    <!-- S4 dot4 SIG_y=510 -->
    <line x1="545" y1="510" x2="330" y2="510" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="526" x2="510" y2="526" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="542" x2="480" y2="542" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="510" r="4" fill="#f59e0b"/><circle cx="510" cy="526" r="4" fill="#e23b3b"/><circle cx="480" cy="542" r="4" fill="#2b2b2b"/>
    <rect x="560" y="496" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="526" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="526" x2="712" y2="517" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="522" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S4</text>
    <text x="628" y="540" text-anchor="middle" font-size="11" fill="#555">dot 4</text>
    <text x="566" y="513" font-size="9" fill="#777">SIG</text><text x="566" y="529" font-size="9" fill="#777">V+</text><text x="566" y="545" font-size="9" fill="#777">GND</text>

    <!-- S5 dot5 SIG_y=580 -->
    <line x1="545" y1="580" x2="330" y2="580" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="596" x2="510" y2="596" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="612" x2="480" y2="612" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="580" r="4" fill="#f59e0b"/><circle cx="510" cy="596" r="4" fill="#e23b3b"/><circle cx="480" cy="612" r="4" fill="#2b2b2b"/>
    <rect x="560" y="566" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="596" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="596" x2="712" y2="587" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="592" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S5</text>
    <text x="628" y="610" text-anchor="middle" font-size="11" fill="#555">dot 5</text>
    <text x="566" y="583" font-size="9" fill="#777">SIG</text><text x="566" y="599" font-size="9" fill="#777">V+</text><text x="566" y="615" font-size="9" fill="#777">GND</text>

    <!-- S6 dot6 SIG_y=650 -->
    <line x1="545" y1="650" x2="330" y2="650" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="545" y1="666" x2="510" y2="666" stroke="#e23b3b" stroke-width="2.5"/>
    <line x1="545" y1="682" x2="480" y2="682" stroke="#2b2b2b" stroke-width="2.5"/>
    <circle cx="330" cy="650" r="4" fill="#f59e0b"/><circle cx="510" cy="666" r="4" fill="#e23b3b"/><circle cx="480" cy="682" r="4" fill="#2b2b2b"/>
    <rect x="560" y="636" width="140" height="60" rx="6" fill="#eef0f2" stroke="#7a7a7a" stroke-width="1.5"/>
    <circle cx="700" cy="666" r="12" fill="#38e1b0" stroke="#15b187"/><line x1="700" y1="666" x2="712" y2="657" stroke="#15b187" stroke-width="2"/>
    <text x="628" y="662" text-anchor="middle" font-size="19" font-weight="700" fill="#222">S6</text>
    <text x="628" y="680" text-anchor="middle" font-size="11" fill="#555">dot 6</text>
    <text x="566" y="653" font-size="9" fill="#777">SIG</text><text x="566" y="669" font-size="9" fill="#777">V+</text><text x="566" y="685" font-size="9" fill="#777">GND</text>
  </g>
  <text x="630" y="724" text-anchor="middle" font-size="11" fill="#888">6× MG90S — V+/GND tap the bus feeders, SIG → ESP GPIO</text>

  <!-- ===================== PUSH BUTTON (4-pin, to 3V3) ===================== -->
  <rect x="340" y="820" width="60" height="60" rx="4" fill="#cfd4da" stroke="#555" stroke-width="2"/>
  <circle cx="370" cy="850" r="15" fill="#c0392b" stroke="#7d241a" stroke-width="2"/>
  <!-- legs -->
  <line x1="345" y1="820" x2="339" y2="812" stroke="#555" stroke-width="2"/>
  <line x1="395" y1="820" x2="401" y2="812" stroke="#555" stroke-width="2"/>
  <line x1="345" y1="880" x2="339" y2="888" stroke="#555" stroke-width="2"/>
  <line x1="395" y1="880" x2="401" y2="888" stroke="#555" stroke-width="2"/>
  <!-- internal pairing (each side joined) -->
  <line x1="347" y1="824" x2="347" y2="876" stroke="#888" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="393" y1="824" x2="393" y2="876" stroke="#888" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="370" y="906" text-anchor="middle" font-size="11" font-weight="600" fill="#333">PUSH BUTTON</text>
  <text x="370" y="920" text-anchor="middle" font-size="10" fill="#777">(4-pin tactile = 2 nodes)</text>
  <text x="370" y="934" text-anchor="middle" font-size="10" fill="#16a34a">idle LOW · pressed HIGH</text>
  <!-- left-node leg -> GPIO18 (blue) -->
  <path d="M230 767 V812 H339" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="339" cy="812" r="4" fill="#2563eb"/>
  <!-- right-node leg -> 3V3 (green) -->
  <path d="M300 767 V800 H401 V812" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <circle cx="401" cy="812" r="4" fill="#16a34a"/>

  <!-- ===================== LEGEND ===================== -->
  <rect x="820" y="240" width="300" height="190" rx="8" fill="#ffffff" stroke="#d8d4cb" stroke-width="1.5"/>
  <text x="836" y="266" font-size="14" font-weight="700" fill="#1a1a1a">WIRE COLOURS</text>
  <g font-size="12.5" fill="#333">
    <line x1="836" y1="288" x2="872" y2="288" stroke="#e23b3b" stroke-width="4"/><text x="882" y="292">+5 V  (V+ bus)</text>
    <line x1="836" y1="312" x2="872" y2="312" stroke="#2b2b2b" stroke-width="4"/><text x="882" y="316">GND  (common)</text>
    <line x1="836" y1="336" x2="872" y2="336" stroke="#f59e0b" stroke-width="4"/><text x="882" y="340">servo signal (PWM)</text>
    <line x1="836" y1="360" x2="872" y2="360" stroke="#2563eb" stroke-width="4"/><text x="882" y="364">button signal → GPIO18</text>
    <line x1="836" y1="384" x2="872" y2="384" stroke="#16a34a" stroke-width="4"/><text x="882" y="388">3V3 → button (HIGH when pressed)</text>
  </g>
  <circle cx="854" cy="410" r="4.5" fill="#333"/><text x="882" y="414" font-size="12" fill="#333">● junction (crossing w/o ● = no connect)</text>

  <!-- ===================== NOTES ===================== -->
  <rect x="820" y="446" width="430" height="372" rx="8" fill="#ffffff" stroke="#d8d4cb" stroke-width="1.5"/>
  <text x="836" y="472" font-size="14" font-weight="700" fill="#1a1a1a">NOTES</text>
  <g font-size="12.5" fill="#333">
    <text x="836" y="496">1.  One 5 V supply → shared V+/GND bus. The 6 servos and</text>
    <text x="852" y="513">the ESP 5V pin all draw from it.</text>
    <text x="836" y="537" font-weight="600" fill="#111">2.  1000 µF cap across the bus, near the servos — recommended.</text>
    <text x="852" y="554">Servos yank big current spikes when they move; the cap is a</text>
    <text x="852" y="571">local reservoir that stops the shared 5 V from dipping and</text>
    <text x="852" y="588">brown-out-resetting the ESP. Cheap insurance. Mind polarity.</text>
    <text x="836" y="612">3.  Servo signals → GPIO 4, 5, 6, 7, 15, 16 (dots 1–6).</text>
    <text x="836" y="636" font-weight="600" fill="#111">4.  Button = GPIO18 + 3V3 — touches neither the bus nor GND:</text>
    <text x="852" y="653">• 4-pin tactile: GPIO18 ↔ one leg, 3V3 ↔ opposite-node leg.</text>
    <text x="852" y="670">• Internal PULL-DOWN → idle LOW, pressed HIGH (rising edge).</text>
    <text x="852" y="687" font-weight="600" fill="#b45309">• 3V3 ONLY — never 5 V (GPIOs aren't 5V-tolerant).</text>
    <text x="852" y="704">• Whole button sits on the ESP header; bus + GND rail unchanged.</text>
    <text x="836" y="728" font-weight="600" fill="#b45309">5.  FIRMWARE: TOUCH_ACTIVE_HIGH = true AND pinMode INPUT_PULLDOWN.</text>
    <text x="852" y="745" fill="#b45309">No pot / haptic / switch → GPIO1 / 8 / 17 unused; speed fixed.</text>
    <text x="836" y="769">6.  Pins match src/main.cpp. Avoid GPIO 0/3/45/46 &amp; 19/20.</text>
  </g>
  <text x="836" y="801" font-size="11" fill="#777">Braille dot order:  1 4 / 2 5 / 3 6</text>
</svg>
