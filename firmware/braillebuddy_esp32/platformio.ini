; BrailleBuddy firmware — ESP32-S3, 6× MG90S servos (direct GPIO) + 1 potentiometer.
; Native USB CDC is enabled so the board enumerates as a serial port for WebSerial.
;
; If your specific S3 board isn't a generic devkit, change `board` (run `pio boards esp32s3`).

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1   ; `Serial` = native USB CDC (no external UART chip)
  -DARDUINO_USB_MODE=1

lib_deps =
  madhephaestus/ESP32Servo
